{% extends "blogapp/base.html" %} {% block header %}Blog{% endblock %} {% block content %}
{% if blogs %}
<div class="blog-list">
	{% for blog in blogs %}
	{% include "blogapp/blog.html" with blog=blog %}
	{% endfor %}
</div>
{% else %}
<p>No blogs are available.</p>
{% endif %}

<a href="{% url 'blogapp:create_blog' %}">
	<button
		type="button"
		class="button">
		Create Blog
	</button>
</a>
{% endblock %}
