<div class="comment">
    <p>Author: {{ comment.author.username }}</p>
    <p class="timestamp">Created at: {{ comment.created_at|date:"d-m-Y" }}</p>
    <p>{{ comment.content }}</p>
    {% if user.is_authenticated and comment.author == user %}
        <form method="post" class="default" action="{% url 'blogapp:delete_comment' comment.id %}">
            {% csrf_token %}
            <button type="submit" class="button-destructive">Delete</button>
        </form>
    {% endif %}
</div>
